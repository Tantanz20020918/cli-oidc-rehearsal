name: Verify release guards reject invalid actors

on:
  workflow_dispatch:
    inputs:
      guard:
        description: Guard to exercise
        required: true
        type: choice
        options:
          - tag-ruleset
          - environment-policy
          - checksum-mismatch

permissions:
  contents: read

jobs:
  tag-ruleset:
    if: inputs.guard == 'tag-ruleset'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Verify GITHUB_TOKEN cannot create a protected release tag
        shell: bash
        run: |
          tag="v9.9.9-ruleset-${GITHUB_RUN_ID}"
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag "${tag}"
          if git push origin "${tag}"; then
            echo "protected tag creation unexpectedly succeeded" >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}"; then
            echo "rejected tag unexpectedly exists on the remote" >&2
            exit 1
          fi
          echo "protected tag creation was rejected as expected"

  environment-policy:
    if: inputs.guard == 'environment-policy'
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - run: |
          echo "non-v* source unexpectedly entered npm-publish" >&2
          exit 1

  checksum-mismatch:
    if: inputs.guard == 'checksum-mismatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22.14.0'
      - name: Verify a tarball changed after checksum generation is rejected
        shell: bash
        run: |
          set -euo pipefail
          mkdir negative-release
          printf 'original tarball' > negative-release/package-1.0.0.tgz
          (cd negative-release && sha256sum package-1.0.0.tgz > checksums.txt)
          printf 'tampered tarball' > negative-release/package-1.0.0.tgz

          if node scripts/verify-release-assets.mjs negative-release; then
            echo "checksum mismatch unexpectedly passed verification" >&2
            exit 1
          fi

          echo "checksum mismatch was rejected as expected"
