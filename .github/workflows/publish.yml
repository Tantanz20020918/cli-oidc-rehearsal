name: Publish npm release from a protected tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      package-file: ${{ steps.pack.outputs.package-file }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '22.14.0'
          registry-url: 'https://registry.npmjs.org'
      - name: Use a pinned OIDC-capable npm CLI
        run: npm install --global npm@11.18.0
      - name: Verify package, lock file, and tag versions
        run: npm run release:verify -- "${GITHUB_REF_NAME}"
      - name: Verify the tagged commit is on main
        run: git merge-base --is-ancestor "${GITHUB_SHA}" origin/main
      - name: Install and test
        run: |
          npm ci
          npm test
      - name: Pack once and generate checksum
        id: pack
        shell: bash
        run: |
          mkdir release
          package_file="$(npm pack --json | node -e "let input=''; process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => process.stdout.write(JSON.parse(input)[0].filename));")"
          mv "${package_file}" release/
          (cd release && sha256sum "${package_file}" > checksums.txt)
          echo "package-file=${package_file}" >> "${GITHUB_OUTPUT}"
      - name: Verify release assets fail closed
        run: node scripts/verify-release-assets.mjs release
      - uses: actions/upload-artifact@v7
        with:
          name: npm-release-${{ github.ref_name }}
          path: release/
          if-no-files-found: error

  publish:
    needs: prepare
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: '22.14.0'
          registry-url: 'https://registry.npmjs.org'
      - name: Use a pinned OIDC-capable npm CLI
        run: npm install --global npm@11.18.0
      - uses: actions/download-artifact@v8
        with:
          name: npm-release-${{ github.ref_name }}
          path: release/
      - name: Publish the exact tarball through OIDC
        run: npm publish "./release/${{ needs.prepare.outputs.package-file }}" --access public --tag rehearsal
      - name: Create a draft GitHub Release with the same assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release/* \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --draft \
            --title "${GITHUB_REF_NAME}" \
            --notes "Rehearsal release published through npm Trusted Publishing under the rehearsal dist-tag."
